services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catalog}
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalog}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalog} -d ${POSTGRES_DB:-catalog}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-catalog}:${POSTGRES_PASSWORD:-catalog}@db:5432/${POSTGRES_DB:-catalog}
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    command: >
      sh -c "alembic upgrade head &&
             python -m scripts.seed_from_dashy --config $${DASHY_CONFIG_PATH:-/app/data/dashy.yaml} --deactivate-missing &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
